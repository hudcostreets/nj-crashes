<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      // Set theme before first paint to prevent FOUC
      (function() {
        var theme = localStorage.getItem('nj-crashes-theme') || 'dark';
        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
        // Also set inline bg color — default browser white flashes briefly
        // before globals.css loads and applies the theme CSS vars.
        document.documentElement.style.backgroundColor = theme === 'dark' ? '#1a1a1a' : '#ffffff';
        // If URL has a hash, hide content until useScrollAnchor scrolls to
        // the target. Prevents flash of page-top content before the scroll.
        // Safety: reveal after 2s even if the hook hasn't (e.g. target not found).
        if (window.location.hash) {
          document.documentElement.style.visibility = 'hidden';
          // Safety: only fires if useScrollAnchor never runs (e.g. JS failure).
          // The hook reveals immediately after scrollIntoView lands.
          setTimeout(function() { document.documentElement.style.visibility = ''; }, 5000);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NJ Car Crash Data</title>
    <meta property="og:title" content="NJ Car Crash Data" />
    <meta property="og:description" content="Analysis & Visualization of car crash data published by NJ State Police and NJ DOT" />
    <meta property="og:image" content="https://crashes.hudcostreets.org/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://crashes.hudcostreets.org" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://crashes.hudcostreets.org/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
